<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Doughnut Economy — 5 Boroughs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #fff;
    }

    header p.subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.4rem;
      font-style: italic;
    }

    .borough-switcher {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.2rem auto 0;
      max-width: 600px;
    }

    .borough-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1.5px solid #444;
      background: transparent;
      color: #aaa;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .borough-btn:hover { border-color: #888; color: #ddd; }

    .borough-btn.active {
      background: var(--borough-color, #555);
      border-color: var(--borough-color, #555);
      color: #fff;
      font-weight: bold;
    }

    main {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 2rem;
      padding: 1.5rem 1rem 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    #viz-wrap {
      position: relative;
      flex: 0 0 auto;
    }

    #viz-wrap svg { display: block; }

    #hint {
      text-align: center;
      font-size: 0.78rem;
      color: #555;
      margin-top: 0.5rem;
      font-style: italic;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
      margin-top: 0.8rem;
      font-size: 0.75rem;
      color: #aaa;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Detail panel */
    #detail {
      flex: 1 1 300px;
      max-width: 420px;
      background: #181b23;
      border: 1px solid #2a2d36;
      border-radius: 10px;
      padding: 1.5rem;
      min-height: 300px;
    }

    #detail.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-style: italic;
      font-size: 0.9rem;
    }

    #detail h2 {
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
      color: #fff;
    }

    #detail .ring-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 0.8rem;
      font-family: 'Arial', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .ring-tag.social { background: #1e3a5f; color: #7eb8f7; }
    .ring-tag.ecological { background: #1e3d2a; color: #72c995; }

    #detail .status-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 0.9rem;
      margin-left: 0.4rem;
      font-family: 'Arial', sans-serif;
    }

    #detail p.context {
      font-size: 0.85rem;
      line-height: 1.65;
      color: #ccc;
      margin-bottom: 1rem;
    }

    #detail h3 {
      font-size: 0.8rem;
      font-family: 'Arial', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.5rem;
    }

    #detail ul {
      list-style: none;
      padding: 0;
    }

    #detail ul li {
      font-size: 0.82rem;
      line-height: 1.5;
      color: #bbb;
      padding: 0.3rem 0;
      border-bottom: 1px solid #222;
      padding-left: 0.9rem;
      position: relative;
    }

    #detail ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #555;
    }

    #detail .source-link {
      margin-top: 1rem;
      font-size: 0.72rem;
      color: #555;
    }

    #detail .source-link a {
      color: #667eea;
      text-decoration: none;
    }

    #detail .source-link a:hover { text-decoration: underline; }

    /* SVG segments */
    .seg { cursor: pointer; transition: opacity 0.15s; }
    .seg:hover { opacity: 0.82; }
    .seg.active-seg { stroke: #fff; stroke-width: 2; }

    .seg-label {
      font-size: 9px;
      fill: rgba(255,255,255,0.7);
      text-anchor: middle;
      pointer-events: none;
      font-family: Arial, sans-serif;
    }

    .ring-label {
      font-size: 8px;
      fill: #555;
      text-anchor: middle;
      font-family: Arial, sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      main { flex-direction: column; align-items: center; }
      #detail { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>NYC Doughnut Economy</h1>
  <p class="subtitle">A portrait of social and ecological wellbeing — 5 Boroughs</p>
  <div class="borough-switcher" id="switcher"></div>
</header>

<main>
  <div id="viz-wrap">
    <svg id="doughnut"></svg>
    <p id="hint">Click any segment to explore data and actions</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1a7340"></div> No problem</div>
      <div class="legend-item"><div class="legend-dot" style="background:#52b788"></div> Under control</div>
      <div class="legend-item"><div class="legend-dot" style="background:#95d5b2"></div> On track</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffd166"></div> Needs attention</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef476f"></div> Critical</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9b2226"></div> Severe</div>
    </div>
  </div>

  <div id="detail" class="empty">
    Select a dimension on the doughnut to explore data and actions
  </div>
</main>

<script>
const BOROUGHS = [
  { id: 'bronx',        label: 'Bronx',         color: '#c1121f', file: 'data/bronx.json' },
  { id: 'manhattan',    label: 'Manhattan',      color: '#2d6a4f', file: 'data/manhattan.json' },
  { id: 'brooklyn',     label: 'Brooklyn',       color: '#e07a5f', file: 'data/brooklyn.json' },
  { id: 'queens',       label: 'Queens',         color: '#457b9d', file: 'data/queens.json' },
  { id: 'staten_island',label: 'Staten Island',  color: '#6d6875', file: 'data/staten_island.json' }
];

const SEVERITY_COLOR = s => {
  if (s === null || s === undefined) return '#3a3a3a';
  if (s <= -100) return '#1a7340';
  if (s <= -50)  return '#52b788';
  if (s <= 0)    return '#95d5b2';
  if (s <= 50)   return '#ffd166';
  if (s <= 100)  return '#ef476f';
  return '#9b2226';
};

const SEVERITY_LABEL = s => {
  if (s === null || s === undefined) return 'Unknown';
  if (s <= -100) return 'No problem';
  if (s <= -50)  return 'Under control';
  if (s <= 0)    return 'On track';
  if (s <= 50)   return 'Needs attention';
  if (s <= 100)  return 'Critical';
  return 'Severe';
};

const SEVERITY_BG = s => {
  const c = SEVERITY_COLOR(s);
  return { background: c + '33', color: c };
};

// SVG layout
const W = 520, H = 520, CX = W/2, CY = H/2;
const HOLE_R = 55;
const SOC_IN = 75, SOC_OUT = 195;
const ECO_IN = 210, ECO_OUT = 290;
const LABEL_SOC_R = (SOC_IN + SOC_OUT) / 2;
const LABEL_ECO_R = (ECO_IN + ECO_OUT) / 2;

let currentData = null;
let activeId = null;

// Build SVG
const svg = d3.select('#doughnut')
  .attr('width', W)
  .attr('height', H)
  .attr('viewBox', `0 0 ${W} ${H}`);

// Center circle
svg.append('circle')
  .attr('cx', CX).attr('cy', CY).attr('r', HOLE_R)
  .attr('fill', '#0f1117')
  .attr('stroke', '#2a2d36')
  .attr('stroke-width', 1);

svg.append('text')
  .attr('x', CX).attr('y', CY - 8)
  .attr('text-anchor', 'middle')
  .attr('fill', '#444')
  .attr('font-size', '10px')
  .attr('font-family', 'Arial')
  .text('NYC');

svg.append('text')
  .attr('x', CX).attr('y', CY + 6)
  .attr('text-anchor', 'middle')
  .attr('fill', '#444')
  .attr('font-size', '10px')
  .attr('font-family', 'Arial')
  .text('Doughnut');

svg.append('text')
  .attr('x', CX).attr('y', CY + 18)
  .attr('text-anchor', 'middle')
  .attr('fill', '#444')
  .attr('font-size', '10px')
  .attr('font-family', 'Arial')
  .text('Economy');

// Ring labels (arc paths)
function addRingLabel(r, text, id) {
  const pathId = 'ring-label-' + id;
  const startAngle = -Math.PI * 0.6;
  const endAngle   = -Math.PI * 0.4;
  const x1 = CX + r * Math.cos(startAngle);
  const y1 = CY + r * Math.sin(startAngle);
  const x2 = CX + r * Math.cos(endAngle);
  const y2 = CY + r * Math.sin(endAngle);
  svg.append('defs').append('path')
    .attr('id', pathId)
    .attr('d', `M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}`);
  svg.append('text').append('textPath')
    .attr('href', '#' + pathId)
    .attr('startOffset', '50%')
    .attr('class', 'ring-label')
    .text(text);
}

addRingLabel(SOC_IN + 8, 'SOCIAL FOUNDATION', 'soc');
addRingLabel(ECO_OUT - 10, 'ECOLOGICAL CEILING', 'eco');

// Segment groups
const socialG = svg.append('g').attr('id', 'social-segs');
const ecoG    = svg.append('g').attr('id', 'eco-segs');
const labelG  = svg.append('g').attr('id', 'labels').attr('pointer-events', 'none');

// Borough buttons
const switcher = document.getElementById('switcher');
BOROUGHS.forEach((b, i) => {
  const btn = document.createElement('button');
  btn.className = 'borough-btn' + (i === 0 ? ' active' : '');
  btn.textContent = b.label;
  btn.style.setProperty('--borough-color', b.color);
  btn.onclick = () => loadBorough(b);
  btn.dataset.id = b.id;
  switcher.appendChild(btn);
});

function setActiveBtn(id) {
  document.querySelectorAll('.borough-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
  });
}

function loadBorough(borough) {
  setActiveBtn(borough.id);
  activeId = null;
  fetch(borough.file)
    .then(r => r.json())
    .then(data => {
      currentData = data;
      renderDoughnut(data);
      showEmptyDetail();
    })
    .catch(() => alert('Could not load data for ' + borough.label));
}

function renderDoughnut(data) {
  const social = data.dimensions.filter(d => d.ring === 'social');
  const eco    = data.dimensions.filter(d => d.ring === 'ecological');

  const arcSoc = d3.arc().innerRadius(SOC_IN).outerRadius(SOC_OUT);
  const arcEco = d3.arc().innerRadius(ECO_IN).outerRadius(ECO_OUT);

  const pieSoc = d3.pie().value(1).sort(null).padAngle(0.018);
  const pieEco = d3.pie().value(1).sort(null).padAngle(0.022);

  const socData = pieSoc(social);
  const ecoData = pieEco(eco);

  // Clear
  socialG.selectAll('*').remove();
  ecoG.selectAll('*').remove();
  labelG.selectAll('*').remove();

  // Social segments
  socialG.selectAll('.seg')
    .data(socData)
    .join('path')
    .attr('class', 'seg')
    .attr('d', arcSoc)
    .attr('fill', d => SEVERITY_COLOR(d.data.severity))
    .attr('stroke', '#0f1117')
    .attr('stroke-width', 1.5)
    .attr('transform', `translate(${CX},${CY})`)
    .on('click', (event, d) => showDetail(d.data));

  // Eco segments
  ecoG.selectAll('.seg')
    .data(ecoData)
    .join('path')
    .attr('class', 'seg')
    .attr('d', arcEco)
    .attr('fill', d => SEVERITY_COLOR(d.data.severity))
    .attr('stroke', '#0f1117')
    .attr('stroke-width', 1.5)
    .attr('transform', `translate(${CX},${CY})`)
    .on('click', (event, d) => showDetail(d.data));

  // Social labels
  socData.forEach(d => {
    const mid = (d.startAngle + d.endAngle) / 2;
    const r = LABEL_SOC_R;
    const x = CX + r * Math.sin(mid);
    const y = CY - r * Math.cos(mid);
    const label = d.data.name.split(' ');
    const lines = label.length > 2
      ? [label.slice(0, Math.ceil(label.length/2)).join(' '), label.slice(Math.ceil(label.length/2)).join(' ')]
      : label;
    const g = labelG.append('g')
      .attr('transform', `translate(${x},${y}) rotate(${(mid * 180/Math.PI)})`);
    lines.forEach((line, i) => {
      g.append('text')
        .attr('class', 'seg-label')
        .attr('y', (i - (lines.length-1)/2) * 10)
        .text(line);
    });
  });

  // Eco labels
  ecoData.forEach(d => {
    const mid = (d.startAngle + d.endAngle) / 2;
    const r = LABEL_ECO_R;
    const x = CX + r * Math.sin(mid);
    const y = CY - r * Math.cos(mid);
    const label = d.data.name.split(' ');
    const lines = label.length > 2
      ? [label.slice(0, Math.ceil(label.length/2)).join(' '), label.slice(Math.ceil(label.length/2)).join(' ')]
      : label;
    const g = labelG.append('g')
      .attr('transform', `translate(${x},${y}) rotate(${(mid * 180/Math.PI)})`);
    lines.forEach((line, i) => {
      g.append('text')
        .attr('class', 'seg-label')
        .attr('y', (i - (lines.length-1)/2) * 10)
        .text(line);
    });
  });
}

function showDetail(dim) {
  activeId = dim.id;
  const sLabel = SEVERITY_LABEL(dim.severity);
  const sBg = SEVERITY_BG(dim.severity);

  const panel = document.getElementById('detail');
  panel.classList.remove('empty');

  const actionsHtml = (dim.actions || [])
    .map(a => `<li>${a}</li>`).join('');

  panel.innerHTML = `
    <h2>${dim.name}</h2>
    <span class="ring-tag ${dim.ring}">${dim.ring === 'social' ? 'Social Foundation' : 'Ecological Ceiling'}</span>
    <span class="status-badge" style="background:${sBg.background};color:${sBg.color}">${sLabel}</span>
    <p class="context">${dim.context}</p>
    <h3>Actions</h3>
    <ul>${actionsHtml}</ul>
    <p class="source-link">
      Source: <a href="${dim.sourceUrl}" target="_blank" rel="noopener">${dim.source}</a>
      ${dim.year ? `(${dim.year})` : ''}
    </p>
  `;

  // Highlight active segment
  d3.selectAll('.seg').classed('active-seg', d => d.data && d.data.id === activeId);
}

function showEmptyDetail() {
  const panel = document.getElementById('detail');
  panel.classList.add('empty');
  panel.innerHTML = 'Select a dimension on the doughnut to explore data and actions';
  d3.selectAll('.seg').classed('active-seg', false);
}

// Load Bronx by default
loadBorough(BOROUGHS[0]);
</script>

</body>
</html>
